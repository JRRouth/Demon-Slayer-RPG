<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Slayer RPG - Battle Prototype</title>
    <style>
        /* Keeping your Fridge Tycoon UI aesthetic */
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0; 
            padding: 20px; 
        }
        .game-container { display: flex; gap: 25px; max-width: 600px; width: 100%; }
        .panel { 
            background: linear-gradient(145deg, #131c2e, #1b2640); 
            border: 1px solid #243557; 
            border-radius: 16px; 
            padding: 24px; 
            flex: 1; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .battle-arena { 
            text-align: center; 
            border: 2px solid #3b82f6; 
            background: #090d16;
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
        }
        .enemy-title { margin: 0 0 5px 0; font-size: 1.5rem; letter-spacing: 0.5px; }
        .hp-bar { color: #ef4444; font-weight: bold; font-size: 1.1rem; }
        .player-hp-bar { color: #10b981; font-weight: bold; font-size: 1.1rem; margin-top: 15px;}

        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button { 
            background: #1e293b; 
            color: #cbd5e1; 
            border: 1px solid #334155; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: inherit;
            transition: all 0.2s ease;
        }
        button:hover:not(:disabled) { 
            background: #1d4ed8; 
            border-color: #3b82f6; 
            color: white;
            transform: scale(1.02);
        }
        button:disabled {
            background: #0f172a;
            border-color: #1e293b;
            color: #475569;
            cursor: not-allowed;
        }
        
        .status-box { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 4px solid #ef4444; 
            margin-top: 20px; 
            min-height: 45px; 
            display: flex;
            align-items: center;
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="panel">
        <div class="battle-arena">
            <h2 id="enemy-name" class="enemy-title">👹 Basic Demon</h2>
            <div id="enemy-hp" class="hp-bar">HP: 100 / 100</div>
        </div>
        
        <div class="move-grid">
            <button id="btn-slash" onclick="playerTurn('slash')">Sword Slash</button>
            <button id="btn-thrust" onclick="playerTurn('thrust')">Sword Thrust</button>
            <button id="btn-block" onclick="playerTurn('block')">Sword Block</button>
            <button id="btn-counter" onclick="playerTurn('counter')">Sword Counter</button>
        </div>

        <div class="status-box" id="combat-log">The dynamic combat parameters are initialized. Select a move to strike.</div>
        <div id="player-hp" class="player-hp-bar">Your HP: 100 / 100</div>
    </div>
</div>

<script>
    let pHP = 100, maxPHP = 100;
    let dHP = 100, maxDHP = 100;
    let isTurnProcessing = false;

    // Tactical state flags
    let playerStates = {
        isBlocking: false,
        isCountering: false
    };
    
    const moves = {
        slash: { name: "Sword Slash", power: 15, maxBp: 20, bp: 20, elementId: "btn-slash" },
        thrust: { name: "Sword Thrust", power: 25, maxBp: 5, bp: 5, elementId: "btn-thrust" },
        block: { name: "Sword Block", power: 0, maxBp: 10, bp: 10, elementId: "btn-block" },
        counter: { name: "Sword Counter", power: 0, maxBp: 8, bp: 8, elementId: "btn-counter" } // Power is handled conditionally
    };

    function updateActionButtons() {
        for (let key in moves) {
            const m = moves[key];
            const btn = document.getElementById(m.elementId);
            if (!btn) continue;
            
            btn.textContent = `${m.name} (${m.bp}/${m.maxBp})`;
            
            if (m.bp <= 0 || isTurnProcessing || pHP <= 0 || dHP <= 0) {
                btn.disabled = true;
            } else {
                btn.disabled = false;
            }
        }
    }

    function playerTurn(moveKey) {
        if (isTurnProcessing || pHP <= 0 || dHP <= 0) return;
        
        const move = moves[moveKey];
        if (move.bp <= 0) return;

        isTurnProcessing = true;
        move.bp--;
        
        // Handle unique tactical statuses
        if (moveKey === 'block') {
            playerStates.isBlocking = true;
            document.getElementById('combat-log').textContent = `🛡️ You raised your blade in a defensive stance! Defenses up for this turn.`;
        } else if (moveKey === 'counter') {
            playerStates.isCountering = true;
            document.getElementById('combat-log').textContent = `⚡ You focused your breathing, waiting to punish the Demon's next incoming strike!`;
        } else {
            // Standard Attack Execution
            let damage = move.power;
            dHP = Math.max(0, dHP - damage);
            document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
            document.getElementById('combat-log').textContent = `⚔️ You executed ${move.name}! Dealt ${damage} damage to the Demon.`;
        }

        updateActionButtons();
        
        if (dHP <= 0) {
            setTimeout(() => {
                document.getElementById('combat-log').textContent = "🥇 VICTORY! The demon was decapitated. Training loop complete.";
                isTurnProcessing = false;
                updateActionButtons();
            }, 600);
            return;
        }

        // Trigger Enemy Action Thread
        setTimeout(() => {
            if (pHP <= 0 || dHP <= 0) {
                isTurnProcessing = false;
                return;
            }

            let botMove = Math.random() > 0.5 ? "Scratch" : "Bite";
            let rawBotDamage = botMove === "Bite" ? 15 : 10;
            let finalDamage = rawBotDamage;
            
            let logMessage = "";

            // Check defensive calculations
            if (playerStates.isCountering) {
                finalDamage = 0;
                let counterDamage = 20;
                dHP = Math.max(0, dHP - counterDamage);
                
                logMessage = `⚡ Perfect Parry! The Demon lunged with ${botMove} but you deflected it entirely and delivered a devastating counter-strike for ${counterDamage} damage!`;
                document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
            } else if (playerStates.isBlocking) {
                finalDamage = Math.floor(rawBotDamage * 0.3); // 70% damage mitigation
                logMessage = `🛡️ Absorbed! The Demon lunged with ${botMove}. Thanks to your stance, damage was reduced from ${rawBotDamage} down to ${finalDamage}!`;
            } else {
                logMessage = `🩸 Direct Hit! The Demon attacked with ${botMove}! You sustained ${finalDamage} damage.`;
            }

            // Reset flags for the next round
            playerStates.isBlocking = false;
            playerStates.isCountering = false;

            pHP = Math.max(0, pHP - finalDamage);
            document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
            document.getElementById('combat-log').textContent = logMessage;
            
            isTurnProcessing = false;
            
            // Check win/loss endpoints
            if (dHP <= 0) {
                document.getElementById('combat-log').textContent += " 🥇 The counter shattered their stance! VICTORY!";
            } else if (pHP <= 0) {
                document.getElementById('combat-log').textContent = "💀 DEFEAT! Your breath training failed. Run endpoint reached.";
            }
            
            updateActionButtons();
        }, 1200);
    }

    window.onload = function() {
        document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
        document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
        updateActionButtons();
    };
</script>

</body>
</html>
