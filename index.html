<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Slayer RPG - Stamina Combat System</title>
    <style>
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0; 
            padding: 20px; 
        }
        .game-container { max-width: 600px; width: 100%; }
        
        .panel { 
            background: linear-gradient(145deg, #131c2e, #1b2640); 
            border: 1px solid #243557; 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #faction-screen { text-align: center; display: block; }
        .faction-title { margin-bottom: 30px; letter-spacing: 1px; }
        .faction-options { display: flex; gap: 20px; }
        .btn-faction {
            flex: 1;
            padding: 40px 20px;
            font-size: 1.25rem;
            background: #1e293b;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        .btn-slayer { border: 2px solid #10b981; color: #10b981; }
        .btn-slayer:hover { background: #10b981; color: #0b0f19; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); transform: scale(1.03); }
        .btn-demon { border: 2px solid #ef4444; color: #ef4444; }
        .btn-demon:hover { background: #ef4444; color: #0b0f19; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); transform: scale(1.03); }

        #battle-screen { display: none; }
        
        .battle-arena { 
            text-align: center; 
            border: 2px solid #3b82f6; 
            background: #090d16;
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 10px; 
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
        }
        .enemy-title { margin: 0 0 5px 0; font-size: 1.5rem; letter-spacing: 0.5px; }
        .hp-bar { color: #ef4444; font-weight: bold; font-size: 1.1rem; }
        
        .resource-container {
            margin-top: 15px;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #1e293b;
        }
        .player-hp-bar { color: #10b981; font-weight: bold; font-size: 1.1rem; text-align: left; margin-bottom: 8px;}
        
        /* Stamina Bar UI Layout Component */
        .stamina-header { display: flex; justify-content: space-between; color: #eab308; font-weight: bold; font-size: 0.95rem; margin-bottom: 4px; }
        .stamina-track { width: 100%; height: 10px; background: #1e293b; border-radius: 99px; overflow: hidden; }
        .stamina-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #eab308, #f59e0b); transition: width 0.3s ease; }

        .streak-counter {
            text-align: center;
            font-size: 0.9rem;
            color: #3b82f6;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-full-width { grid-column: span 2; }
        
        button.move-btn { 
            background: #1e293b; 
            color: #cbd5e1; 
            border: 1px solid #334155; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: inherit;
            transition: all 0.2s ease;
        }
        button.move-btn:hover:not(:disabled) { 
            background: #1d4ed8; 
            border-color: #3b82f6; 
            color: white;
            transform: scale(1.02);
        }
        button.move-btn.rest-btn-style {
            background: #14532d;
            border-color: #22c55e;
            color: #22c55e;
        }
        button.move-btn.rest-btn-style:hover:not(:disabled) {
            background: #22c55e;
            color: #061f10;
        }
        button.move-btn.desperation-glow {
            border-color: #f59e0b !important;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        button.move-btn:disabled {
            background: #0f172a;
            border-color: #1e293b;
            color: #475569;
            cursor: not-allowed;
            box-shadow: none !important;
        }
        
        .status-box { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 4px solid #ef4444; 
            margin-top: 20px; 
            min-height: 45px; 
            display: flex;
            align-items: center;
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="panel" id="faction-screen">
        <h2 class="faction-title">CHOOSE YOUR PATH</h2>
        <div class="faction-options">
            <button class="btn-faction btn-slayer" onclick="selectFaction('slayer')">⚔️ Demon Slayer</button>
            <button class="btn-faction btn-demon" onclick="selectFaction('demon')">👹 Rogue Demon</button>
        </div>
    </div>

    <div class="panel" id="battle-screen">
        <div class="battle-arena" id="arena-border">
            <h2 id="enemy-name" class="enemy-title">Opponent</h2>
            <div id="enemy-hp" class="hp-bar">HP: 100 / 100</div>
        </div>
        
        <div id="streak-display" class="streak-counter">WIN STREAK: 0 | BOT DAMAGE: +0%</div>
        
        <div class="move-grid">
            <button id="btn-1" class="move-btn" onclick="playerTurn('m1')">Move 1</button>
            <button id="btn-2" class="move-btn" onclick="playerTurn('m2')">Move 2</button>
            <button id="btn-3" class="move-btn" onclick="playerTurn('m3')">Move 3</button>
            <button id="btn-4" class="move-btn" onclick="playerTurn('m4')">Move 4</button>
            <button id="btn-5" class="move-btn btn-full-width rest-btn-style" onclick="playerTurn('m5')">Breathe / Rest</button>
        </div>

        <div class="status-box" id="combat-log">Ready for combat operations. Make your opening strike.</div>
        
        <div class="resource-container">
            <div id="player-hp" class="player-hp-bar">Your HP: 100 / 100</div>
            <div class="stamina-section">
                <div class="stamina-header">
                    <span>STAMINA</span>
                    <span id="stamina-text">100 / 100</span>
                </div>
                <div class="stamina-track">
                    <div id="stamina-bar-fill" class="stamina-fill"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let pHP = 100, maxPHP = 100;
    let dHP = 100, maxDHP = 100;
    let pStamina = 100, maxStamina = 100;
    let isTurnProcessing = false;
    let selectedFaction = "";
    let winStreak = 0;

    let playerStates = { isBlocking: false, isCountering: false, isResting: false };
    let moves = null; 

    const factionData = {
        slayer: {
            enemyPrefix: "👹 Demon Tier ",
            arenaColor: "#3b82f6", 
            moves: {
                m1: { name: "Sword Slash", power: 15, cost: 15, type: "attack" },
                m2: { name: "Sword Thrust", power: 26, cost: 40, type: "attack" },
                m3: { name: "Sword Block", power: 0, cost: 20, type: "block" },
                m4: { name: "Sword Counter", power: 0, cost: 25, type: "counter" },
                m5: { name: "Total Concentration Breath", power: 0, cost: -50, type: "rest" } // Negative cost adds stamina
            }
        },
        demon: {
            enemyPrefix: "⚔️ Slayer Rank ",
            arenaColor: "#ef4444", 
            moves: {
                m1: { name: "Demon Scratch", power: 14, cost: 15, type: "attack" },
                m2: { name: "Flesh Bite", power: 24, cost: 35, type: "attack" },
                m3: { name: "Blood Regenerate", power: 20, cost: 25, type: "heal" },
                m4: { name: "Blood Art Counter", power: 0, cost: 25, type: "counter" },
                m5: { name: "Deep Hibernation Rest", power: 0, cost: -50, type: "rest" }
            }
        }
    };

    function selectFaction(faction) {
        selectedFaction = faction;
        moves = factionData[faction].moves;
        pStamina = 100; // Fresh start

        document.getElementById('arena-border').style.borderColor = factionData[faction].arenaColor;
        document.getElementById('faction-screen').style.display = 'none';
        document.getElementById('battle-screen').style.display = 'block';

        setupMatch();
    }

    function setupMatch() {
        dHP = 100;
        isTurnProcessing = false;

        playerStates.isBlocking = false;
        playerStates.isCountering = false;
        playerStates.isResting = false;
        
        document.getElementById('enemy-name').textContent = `${factionData[selectedFaction].enemyPrefix}${winStreak + 1}`;
        document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
        document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
        
        document.getElementById('streak-display').textContent = `WIN STREAK: ${winStreak} | BOT DAMAGE: +${winStreak * 10}%`;
        document.getElementById('streak-display').style.color = selectedFaction === 'slayer' ? '#3b82f6' : '#ef4444';
        
        document.getElementById('combat-log').textContent = `An upgraded foe approaches! Begin round ${winStreak + 1}.`;
        
        updateActionButtons();
    }

    function updateActionButtons() {
        if (!moves) return;

        let isDesperate = pHP < 50 && dHP > 50;

        // Render Stamina interface values
        document.getElementById('stamina-text').textContent = `${pStamina} / ${maxStamina}`;
        document.getElementById('stamina-bar-fill').style.width = `${(pStamina / maxStamina) * 100}%`;

        for (let key in moves) {
            const m = moves[key];
            let btnId = 'btn-1';
            if(key === 'm2') btnId = 'btn-2';
            if(key === 'm3') btnId = 'btn-3';
            if(key === 'm4') btnId = 'btn-4';
            if(key === 'm5') btnId = 'btn-5';
            
            const btn = document.getElementById(btnId);
            if (!btn) continue;
            
            if (key === 'm5') {
                btn.textContent = `🧘 ${m.name} (+50 STAM)`;
            } else {
                btn.textContent = `${m.name} [${m.cost} STAM]`;
            }
            
            if (key === 'm4' && isDesperate) {
                btn.classList.add('desperation-glow');
            } else {
                btn.classList.remove('desperation-glow');
            }
            
            // Check if user has sufficient stamina layout reserves
            let hasStamina = (m.cost <= pStamina) || (key === 'm5');
            
            if (!hasStamina || isTurnProcessing || pHP <= 0 || dHP <= 0) {
                btn.disabled = true;
            } else {
                btn.disabled = false;
            }
        }
    }

    function playerTurn(moveKey) {
        if (!moves || isTurnProcessing || pHP <= 0 || dHP <= 0) return;
        
        const move = moves[moveKey];
        if (move.type !== 'rest' && move.cost > pStamina) return;

        isTurnProcessing = true;
        
        if (move.type === 'rest') {
            playerStates.isResting = true;
            // Recover stamina up to max engine cap
            pStamina = Math.min(maxStamina, pStamina + Math.abs(move.cost));
            document.getElementById('combat-log').textContent = `🧘 You drop your stance to recover focus! Regenerated +50 Stamina, but you are wide open to incoming strikes!`;
        } else {
            pStamina -= move.cost;
            if (move.type === 'block') {
                playerStates.isBlocking = true;
                document.getElementById('combat-log').textContent = `🛡️ You raised your defenses! Mitigation active for this exchange.`;
            } else if (move.type === 'counter') {
                playerStates.isCountering = true;
                if (pHP < 50 && dHP > 50) {
                    document.getElementById('combat-log').textContent = `⚡ Desperation Counter! Your low health lures the overconfident bot. The bait chance is near guaranteed!`;
                } else {
                    document.getElementById('combat-log').textContent = `⚡ Stance Set! Bracing for the incoming strike...`;
                }
            } else if (move.type === 'heal') {
                pHP = Math.min(maxPHP, pHP + move.power);
                document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
                document.getElementById('combat-log').textContent = `🩸 Recovery Action! Patched up, recovering ${move.power} HP.`;
            } else {
                let actualPower = move.power;
                let logMsg = "";
                
                if (selectedFaction === 'slayer' && move.name === "Sword Thrust" && pHP < 35) {
                    actualPower = Math.floor(move.power * 1.5);
                    logMsg = `🎯 CRITICAL BREAK! Using ${move.name} while critical unleashed a desperate thrust dealing ${actualPower} damage!`;
                } else {
                    logMsg = `💥 Strike Hit! You executed ${move.name} and dealt ${actualPower} damage.`;
                }

                dHP = Math.max(0, dHP - actualPower);
                document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
                
                if (selectedFaction === 'demon' && move.name === "Flesh Bite") {
                    let leech = Math.floor(actualPower * 0.30);
                    pHP = Math.min(maxPHP, pHP + leech);
                    logMsg = `💥 Strike Hit! You bit deep into the foe using ${move.name} for ${actualPower} damage and leeched 🩸 ${leech} HP!`;
                }

                document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
                document.getElementById('combat-log').textContent = logMsg;
            }
        }

        updateActionButtons();

        if (dHP <= 0) {
            setTimeout(() => {
                winStreak++;
                document.getElementById('combat-log').textContent = `🥇 VICTORY! Opponent neutralized. Moving to Win Streak ${winStreak}. Loading next tier...`;
                updateActionButtons(); 
                setTimeout(() => { setupMatch(); }, 2000);
            }, 600);
            return;
        }

        setTimeout(() => {
            if (pHP <= 0 || dHP <= 0) {
                isTurnProcessing = false;
                return;
            }

            let aiMoveName = "";
            let rawAiDamage = 0;
            
            let botGreedFactor = (dHP - pHP) / 100; 
            if (playerStates.isResting) { botGreedFactor = 1.0; }

            let dodgeChanceBase = 0.35; 
            let finalDodgeChance = Math.max(0.0, dodgeChanceBase - botGreedFactor); 

            if (playerStates.isCountering && Math.random() > finalDodgeChance) { 
                if (selectedFaction === 'slayer') {
                    aiMoveName = "Blood Lust Desperation Claw";
                    rawAiDamage = 16;
                } else {
                    aiMoveName = "Furious Heavy Strike";
                    rawAiDamage = 18;
                }
            } 
            else if (playerStates.isCountering) {
                aiMoveName = selectedFaction === 'slayer' ? "Demon Focus Stance" : "Total Concentration Breathing";
                rawAiDamage = 0; 
            } 
            else if (pHP < 35 && !playerStates.isResting) {
                aiMoveName = selectedFaction === 'slayer' ? "Blood Art: Crimson Rent" : "Water Breathing: Constant Flux";
                rawAiDamage = 26; 
            } 
            else {
                if (selectedFaction === 'slayer') {
                    aiMoveName = Math.random() > 0.4 ? "Violent Bite" : "Claw Rip";
                    rawAiDamage = aiMoveName === "Violent Bite" ? 15 : 10;
                } else {
                    aiMoveName = Math.random() > 0.4 ? "Water Thrust Strike" : "Form 1: Horizontal Slash";
                    rawAiDamage = aiMoveName === "Water Thrust Strike" ? 16 : 11;
                }
            }

            let damageMultiplier = 1 + (winStreak * 0.10);
            rawAiDamage = Math.floor(rawAiDamage * damageMultiplier);

            let finalDamage = rawAiDamage;
            let logMessage = "";

            if (rawAiDamage === 0) {
                logMessage = `🧠 Smart AI! The opponent tracked your stance layout, backed off safely, and used ${aiMoveName}.`;
            } else if (playerStates.isCountering) {
                finalDamage = 0;
                let counterDmg = 25; 
                if (pHP < 40) { counterDmg = 38; } 

                dHP = Math.max(0, dHP - counterDmg);
                logMessage = `⚡ PUNISHED! The bot's greed blinded them! They swung into your counter using ${aiMoveName}. You reflected everything and slashed back for ${counterDmg} damage!`;
                document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
            } else if (playerStates.isBlocking) {
                finalDamage = Math.floor(rawAiDamage * 0.3); 
                logMessage = `🛡️ Blocked! Opponent executed ${aiMoveName}. Your stance reduced scaling damage to ${finalDamage}.`;
            } else if (playerStates.isResting) {
                logMessage = `🚨 Caught Resting! The bot capitalized on your down frame and slammed you with ${aiMoveName} for ${finalDamage} damage!`;
            } else {
                logMessage = `🚨 Ouch! The bot smashed through your line using ${aiMoveName} for ${finalDamage} damage.`;
            }

            playerStates.isBlocking = false;
            playerStates.isCountering = false;
            playerStates.isResting = false; 

            pHP = Math.max(0, pHP - finalDamage);
            document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
            document.getElementById('combat-log').textContent = logMessage;
            
            isTurnProcessing = false;
            
            if (dHP <= 0) {
                winStreak++;
                document.getElementById('combat-log').textContent += ` 🥇 Your flawless execution broke them! Next round loading...`;
                updateActionButtons();
                setTimeout(() => { setupMatch(); }, 2000);
            } else if (pHP <= 0) {
                document.getElementById('combat-log').textContent = `💀 GAME OVER! You died at Tier ${winStreak + 1}. Final Streak: ${winStreak}. Refresh to restart your run.`;
            }
            updateActionButtons();
        }, 1100);
    }

    window.onload = function() {
        document.getElementById('faction-screen').style.display = 'block';
        document.getElementById('battle-screen').style.display = 'none';
    };
</script>

</body>
</html>
