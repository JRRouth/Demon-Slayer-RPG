<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demon Slayer RPG - Battle Prototype</title>
    <style>
        /* Keeping your Fridge Tycoon UI aesthetic */
        body { 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0; 
            padding: 20px; 
        }
        .game-container { max-width: 600px; width: 100%; }
        
        .panel { 
            background: linear-gradient(145deg, #131c2e, #1b2640); 
            border: 1px solid #243557; 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Faction Screen Styling */
        #faction-screen { text-align: center; }
        .faction-title { margin-bottom: 30px; letter-spacing: 1px; }
        .faction-options { display: flex; gap: 20px; }
        .btn-faction {
            flex: 1;
            padding: 40px 20px;
            font-size: 1.25rem;
            background: #1e293b;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-slayer { border: 2px solid #10b981; color: #10b981; }
        .btn-slayer:hover { background: #10b981; color: #0b0f19; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); transform: scale(1.03); }
        .btn-demon { border: 2px solid #ef4444; color: #ef4444; }
        .btn-demon:hover { background: #ef4444; color: #0b0f19; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); transform: scale(1.03); }

        /* Battle Screen (Hidden by default) */
        #battle-screen { display: none; }
        
        .battle-arena { 
            text-align: center; 
            border: 2px solid #3b82f6; 
            background: #090d16;
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
        }
        .enemy-title { margin: 0 0 5px 0; font-size: 1.5rem; letter-spacing: 0.5px; }
        .hp-bar { color: #ef4444; font-weight: bold; font-size: 1.1rem; }
        .player-hp-bar { color: #10b981; font-weight: bold; font-size: 1.1rem; margin-top: 15px;}

        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button.move-btn { 
            background: #1e293b; 
            color: #cbd5e1; 
            border: 1px solid #334155; 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: inherit;
            transition: all 0.2s ease;
        }
        button.move-btn:hover:not(:disabled) { 
            background: #1d4ed8; 
            border-color: #3b82f6; 
            color: white;
            transform: scale(1.02);
        }
        button.move-btn:disabled {
            background: #0f172a;
            border-color: #1e293b;
            color: #475569;
            cursor: not-allowed;
        }
        
        .status-box { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 4px solid #ef4444; 
            margin-top: 20px; 
            min-height: 45px; 
            display: flex;
            align-items: center;
            color: #94a3b8;
            font-size: 0.95rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="panel" id="faction-screen">
        <h2 class="faction-title">CHOOSE YOUR PATH</h2>
        <div class="faction-options">
            <button class="btn-faction btn-slayer" onclick="selectFaction('slayer')">⚔️ Demon Slayer</button>
            <button class="btn-faction btn-demon" onclick="selectFaction('demon')">👹 Rogue Demon</button>
        </div>
    </div>

    <div class="panel" id="battle-screen">
        <div class="battle-arena" id="arena-border">
            <h2 id="enemy-name" class="enemy-title">Opponent</h2>
            <div id="enemy-hp" class="hp-bar">HP: 100 / 100</div>
        </div>
        
        <div class="move-grid">
            <button id="btn-1" class="move-btn" onclick="playerTurn('m1')">Move 1</button>
            <button id="btn-2" class="move-btn" onclick="playerTurn('m2')">Move 2</button>
            <button id="btn-3" class="move-btn" onclick="playerTurn('m3')">Move 3</button>
            <button id="btn-4" class="move-btn" onclick="playerTurn('m4')">Move 4</button>
        </div>

        <div class="status-box" id="combat-log">Ready for combat operations. Make your opening strike.</div>
        <div id="player-hp" class="player-hp-bar">Your HP: 100 / 100</div>
    </div>
</div>

<script>
    let pHP = 100, maxPHP = 100;
    let dHP = 100, maxDHP = 100;
    let isTurnProcessing = false;
    let selectedFaction = "";

    let playerStates = { isBlocking: false, isCountering: false };
    let moves = {};

    // Move pools dependent on your selection
    const factionData = {
        slayer: {
            enemyName: "👹 Basic Demon",
            arenaColor: "#3b82f6", // Blue aura
            moves: {
                m1: { name: "Sword Slash", power: 15, maxBp: 20, bp: 20, type: "attack" },
                m2: { name: "Sword Thrust", power: 25, maxBp: 5, bp: 5, type: "attack" },
                m3: { name: "Sword Block", power: 0, maxBp: 10, bp: 10, type: "block" },
                m4: { name: "Sword Counter", power: 0, maxBp: 8, bp: 8, type: "counter" }
            }
        },
        demon: {
            enemyName: "⚔️ Corps Trainee",
            arenaColor: "#ef4444", // Red blood aura
            moves: {
                m1: { name: "Demon Scratch", power: 14, maxBp: 20, bp: 20, type: "attack" },
                m2: { name: "Flesh Bite", power: 22, maxBp: 6, bp: 6, type: "attack" },
                m3: { name: "Blood Regenerate", power: 20, maxBp: 8, bp: 8, type: "heal" },
                m4: { name: "Blood Art Counter", power: 0, maxBp: 7, bp: 7, type: "counter" }
            }
        }
    };

    function selectFaction(faction) {
        selectedFaction = faction;
        const data = factionData[faction];
        moves = data.moves;

        // Apply theme color and names based on faction
        document.getElementById('enemy-name').textContent = data.enemyName;
        document.getElementById('arena-border').style.borderColor = data.arenaColor;

        // Transition Screen States
        document.getElementById('faction-screen').style.display = 'none';
        document.getElementById('battle-screen').style.display = 'block';

        // Redraw labels
        document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
        document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
        updateActionButtons();
    }

    function updateActionButtons() {
        for (let key in moves) {
            const m = moves[key];
            const btn = document.getElementById(key === 'm1' ? 'btn-1' : key === 'm2' ? 'btn-2' : key === 'm3' ? 'btn-3' : 'btn-4');
            if (!btn) continue;
            
            btn.textContent = `${m.name} (${m.bp}/${m.maxBp})`;
            
            if (m.bp <= 0 || isTurnProcessing || pHP <= 0 || dHP <= 0) {
                btn.disabled = true;
            } else {
                btn.disabled = false;
            }
        }
    }

    function playerTurn(moveKey) {
        if (isTurnProcessing || pHP <= 0 || dHP <= 0) return;
        
        const move = moves[moveKey];
        if (move.bp <= 0) return;

        isTurnProcessing = true;
        move.bp--;
        
        // Handle Action Types
        if (move.type === 'block') {
            playerStates.isBlocking = true;
            document.getElementById('combat-log').textContent = `🛡️ You raised your blade defensively! Incoming strike mitigation primed.`;
        } else if (move.type === 'counter') {
            playerStates.isCountering = true;
            document.getElementById('combat-log').textContent = `⚡ Stance Set! You brace to absorb and fiercely channel back the opponent's momentum.`;
        } else if (move.type === 'heal') {
            pHP = Math.min(maxPHP, pHP + move.power);
            document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
            document.getElementById('combat-log').textContent = `🩸 Blood Art! Your wounds sew shut, restoring ${move.power} HP.`;
        } else {
            // Standard Attack
            dHP = Math.max(0, dHP - move.power);
            document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
            document.getElementById('combat-log').textContent = `💥 Burst Action! You executed ${move.name} and dealt ${move.power} damage.`;
        }

        updateActionButtons();
        if (dHP <= 0) {
            setTimeout(() => {
                document.getElementById('combat-log').textContent = "🥇 COMBAT TERMINATED: Objective achieved. Target neutralized.";
                isTurnProcessing = false;
                updateActionButtons();
            }, 600);
            return;
        }

        // Trigger AI Opponent Thread
        setTimeout(() => {
            if (pHP <= 0 || dHP <= 0) {
                isTurnProcessing = false;
                return;
            }

            // AI action choice profile
            let aiMoveName = selectedFaction === 'slayer' ? (Math.random() > 0.5 ? "Scratch" : "Bite") : (Math.random() > 0.5 ? "Slash Strike" : "Thrust Strike");
            let rawAiDamage = aiMoveName === "Bite" || aiMoveName === "Thrust Strike" ? 16 : 10;
            let finalDamage = rawAiDamage;
            let logMessage = "";

            if (playerStates.isCountering) {
                finalDamage = 0;
                let counterDmg = 20;
                dHP = Math.max(0, dHP - counterDmg);
                logMessage = `⚡ Perfect Counter Calculation! The opponent launched ${aiMoveName}, but you turned the impact completely into a ${counterDmg} damage counter-strike!`;
                document.getElementById('enemy-hp').textContent = `HP: ${dHP} / ${maxDHP}`;
            } else if (playerStates.isBlocking) {
                finalDamage = Math.floor(rawAiDamage * 0.3); // 70% reduction
                logMessage = `🛡️ Stance Absorbed! Opponent utilized ${aiMoveName}. Heavy dampening dropped incoming damage down to ${finalDamage}.`;
            } else {
                logMessage = `🚨 Impact Taken! The enemy broke through your baseline defense using ${aiMoveName} for ${finalDamage} damage.`;
            }

            playerStates.isBlocking = false;
            playerStates.isCountering = false;

            pHP = Math.max(0, pHP - finalDamage);
            document.getElementById('player-hp').textContent = `Your HP: ${pHP} / ${maxPHP}`;
            document.getElementById('combat-log').textContent = logMessage;
            
            isTurnProcessing = false;
            
            if (dHP <= 0) {
                document.getElementById('combat-log').textContent += " 🥇 The counter force crushed their remaining vital reserves!";
            } else if (pHP <= 0) {
                document.getElementById('combat-log').textContent = "💀 LIFESIGN TERMINATED: Match criteria lost. Run state completed.";
            }
            updateActionButtons();
        }, 1200);
    }
</script>

</body>
</html>
