<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Keeping your Fridge Tycoon UI aesthetic */
        body { background-color: #0b0f19; color: #e2e8f0; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .game-container { display: flex; gap: 25px; max-width: 800px; width: 100%; }
        .panel { background: linear-gradient(145deg, #131c2e, #1b2640); border: 1px solid #243557; border-radius: 16px; padding: 24px; flex: 1; }
        
        .battle-arena { text-align: center; border: 2px solid #3b82f6; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { background: #1e293b; color: white; border: 1px solid #3b82f6; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #3b82f6; }
        .status-box { background: #0f172a; padding: 15px; border-radius: 8px; border-left: 4px solid #ef4444; margin-top: 15px; min-height: 50px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="panel">
        <div class="battle-arena">
            <h2 id="enemy-name">Basic Demon</h2>
            <div id="enemy-hp">HP: 100</div>
        </div>
        
        <div class="move-grid">
            <button onclick="playerTurn('slash')">Sword Slash</button>
            <button onclick="playerTurn('thrust')">Sword Thrust</button>
            <button onclick="playerTurn('block')">Sword Block</button>
            <button onclick="playerTurn('counter')">Sword Counter</button>
        </div>

        <div class="status-box" id="combat-log">Select a move to begin training.</div>
        <div style="margin-top:20px;">Your HP: <span id="player-hp">100</span></div>
    </div>
</div>

<script>
    let pHP = 100, dHP = 100;
    
    const moves = {
        slash: { name: "Sword Slash", power: 15 },
        thrust: { name: "Sword Thrust", power: 25 },
        block: { name: "Sword Block", power: 0 },
        counter: { name: "Sword Counter", power: 20 }
    };

    function playerTurn(moveKey) {
        const move = moves[moveKey];
        let damage = move.power;
        
        // Player Action
        dHP -= damage;
        document.getElementById('combat-log').textContent = `You used ${move.name}! Dealt ${damage} damage.`;
        
        if (dHP <= 0) {
            document.getElementById('combat-log').textContent = "Victory! The demon is defeated.";
            return;
        }

        // Bot Action (Turn 2)
        setTimeout(() => {
            let botMove = Math.random() > 0.5 ? "Scratch" : "Bite";
            let botDamage = 10;
            pHP -= botDamage;
            document.getElementById('combat-log').textContent = `Demon used ${botMove}! You took ${botDamage} damage.`;
            document.getElementById('player-hp').textContent = pHP;
            document.getElementById('enemy-hp').textContent = "HP: " + dHP;
        }, 800);
    }
</script>

</body>
</html>
